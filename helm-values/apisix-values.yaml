apisix:
  image:
    repository: apache/apisix
    tag: 3.14.1-debian
  replicaCount: 1

  # Disable SSL initially for local testing, can be enabled later
  ssl:
    enabled: false
    # existingSecret: ekmai-tls-cert

  admin:
    # For production, do NOT hardcode API keys here. Use a Kubernetes Secret
    # and reference it via your deployment process or a secret-manager plugin.
    # Example: set `apisix.admin.credentials` from a sealed/managed secret.
    credentials: {}
    allow:
      ipList:
        - "10.0.0.0/8"          # K8s Pod CIDR
        - "172.16.0.0/12"       # K8s Service CIDR

  prometheus:
    enabled: true

etcd:
  replicaCount: 1            # 1 node for local testing
  persistence:
    enabled: true
    size: 2Gi
  auth:
    rbac:
      create: true
      enabled: true

dashboard:
  enabled: true
  replicaCount: 1
  config:
    authentication:
      users:
        # Do not store dashboard user/password in values. Use a Secret such as
        # grafana-admin-secret and configure the chart to read from it.

gateway:
  type: NodePort             # Local access via port forwarding or NodePort
  http:
    enabled: true
    servicePort: 80
  tls:
    enabled: false
    servicePort: 443

ingress-controller:
  enabled: true
  config:
    apisix:
      serviceNamespace: ekmai-gateway
