apisix:
  image:
    repository: apache/apisix
    tag: 3.14.1-debian
  replicaCount: 1

  # Disable SSL initially for local testing, can be enabled later
  ssl:
    enabled: false
    # existingSecret: ekmai-tls-cert

  admin:
    credentials:
      # ⚠️ 生產環境請更換為強密碼 — 使用 `openssl rand -hex 16` 生成
      admin: "REPLACE_WITH_STRONG_API_KEY"
      viewer: "REPLACE_WITH_STRONG_VIEWER_KEY"
    allow:
      ipList:
        - "10.0.0.0/8"          # K8s Pod CIDR
        - "172.16.0.0/12"       # K8s Service CIDR

  prometheus:
    enabled: true

etcd:
  replicaCount: 1            # 1 node for local testing
  persistence:
    enabled: true
    size: 2Gi
  auth:
    rbac:
      create: true
      enabled: true

dashboard:
  enabled: true
  replicaCount: 1
  config:
    authentication:
      users:
        # ⚠️ 生產環境請更換
        - username: admin
          password: "REPLACE_WITH_STRONG_PASSWORD"

gateway:
  type: NodePort             # Local access via port forwarding or NodePort
  http:
    enabled: true
    servicePort: 80
  tls:
    enabled: false
    servicePort: 443

ingress-controller:
  enabled: true
  config:
    apisix:
      serviceNamespace: ekmai-gateway
