apisix:
  image:
    repository: apache/apisix
    tag: 3.14.1-debian
  replicaCount: 1

  # Disable SSL initially for local testing, can be enabled later
  ssl:
    enabled: false
    # existingSecret: ekmai-tls-cert

  admin:
    credentials:
      admin: "edd1c9f034335f136f87ad84b625c8f1" 
      viewer: "4054f7cf07e344346cd3f287985e76a2"
    allow:
      ipList:
        - "0.0.0.0/0"     # Open for local testing via minikube/k3d

  prometheus:
    enabled: true

etcd:
  replicaCount: 1            # 1 node for local testing
  persistence:
    enabled: true
    size: 2Gi
  auth:
    rbac:
      create: false
      enabled: false

dashboard:
  enabled: true
  replicaCount: 1
  config:
    authentication:
      users:
        - username: admin
          password: admin

gateway:
  type: NodePort             # Local access via port forwarding or NodePort
  http:
    enabled: true
    servicePort: 80
  tls:
    enabled: false
    servicePort: 443

ingress-controller:
  enabled: true
  config:
    apisix:
      serviceNamespace: ekmai-gateway
