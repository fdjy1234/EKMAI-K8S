# ============================================================
# EKMAI-K8S Secret 範本
# 複製此檔為 secrets.yaml 並填入實際值
# ⚠️  secrets.yaml 已加入 .gitignore，不會被提交
# ============================================================

---
# ── Keycloak ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: ekmai-iam
type: Opaque
stringData:
  username: keycloak
  password: REPLACE_ME          # Keycloak DB 密碼
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: ekmai-iam
type: Opaque
stringData:
  username: admin
  password: REPLACE_ME          # Keycloak 管理員密碼
---
# ── Mattermost ────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mattermost-db-secret
  namespace: ekmai-collab
type: Opaque
stringData:
  username: mmuser
  password: REPLACE_ME          # Mattermost DB 密碼
  dsn: "postgres://mmuser:REPLACE_ME@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10"
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-proxy-secret
  namespace: ekmai-collab
type: Opaque
stringData:
  client-secret: REPLACE_ME    # Keycloak gitlab client secret
---
# ── Outline ───────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: outline-secrets
  namespace: ekmai-kb
type: Opaque
stringData:
  SECRET_KEY: REPLACE_ME
  UTILS_SECRET: REPLACE_ME
  OIDC_CLIENT_SECRET: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: outline-db-secret
  namespace: ekmai-kb
type: Opaque
stringData:
  username: outline
  password: REPLACE_ME
  url: "postgres://outline:REPLACE_ME@outline-db:5432/outline?sslmode=disable"
---
# ── Wiki.js ───────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: wikijs-db-secret
  namespace: ekmai-kb
type: Opaque
stringData:
  username: wiki
  password: REPLACE_ME
---
# ── ELK ───────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: elk-secrets
  namespace: ekmai-observe
type: Opaque
stringData:
  ELASTIC_PASSWORD: REPLACE_ME
  KIBANA_SYSTEM_PASSWORD: REPLACE_ME
---
# ── TLS 證書 ──────────────────────────────────────────────────
# TLS 證書建議使用 kubectl 指令建立：
# kubectl create secret tls ekmai-tls-cert \
#   --cert=cert.pem --key=key.pem -n ekmai-gateway
#
# 企業根 CA：
# kubectl create secret generic ekmai-root-ca \
#   --from-file=ski-Root-CA.pem=ski-Root-CA.pem -n ekmai-gateway
