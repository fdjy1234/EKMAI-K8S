---
# NetworkPolicy: 只允許 Keycloak Pod 存取 PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-db-policy
  namespace: ekmai-iam
spec:
  podSelector:
    matchLabels:
      app: keycloak-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - protocol: TCP
          port: 5432
