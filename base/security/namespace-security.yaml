# PodDisruptionBudgets for key apps
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-keycloak
  namespace: ekmai-iam
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: keycloak

