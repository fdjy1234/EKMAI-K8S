---
apiVersion: v1
kind: LimitRange
metadata:
  name: ekmai-limitrange
  namespace: ekmai-observe
spec:
  limits:
    - type: Container
      default:
        cpu: 1000m
        memory: 1Gi
      defaultRequest:
        cpu: 200m
        memory: 256Mi
      min:
        cpu: 50m
        memory: 64Mi

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ekmai-iam
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress: []

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-and-same-ns
  namespace: ekmai-iam
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ekmai
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}                # allow same namespace
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: gateway

