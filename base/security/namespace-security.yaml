---
# Namespace-level LimitRanges and NetworkPolicies
# Includes:
# - LimitRange per namespace (ekmai-*)
# - default-deny ingress NetworkPolicy per namespace
# - allow-from-gateway NetworkPolicy to permit ingress from ekmai-gateway
# - PodDisruptionBudgets for key applications

apiVersion: v1
kind: LimitRange
metadata:
  name: ekmai-limitrange
  namespace: ekmai-iam
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      min:
        cpu: 50m
        memory: 64Mi

---
apiVersion: v1
kind: LimitRange
metadata:
  name: ekmai-limitrange
  namespace: ekmai-collab
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      min:
        cpu: 50m
        memory: 64Mi

---
apiVersion: v1
kind: LimitRange
metadata:
  name: ekmai-limitrange
  namespace: ekmai-kb
spec:
  limits:
