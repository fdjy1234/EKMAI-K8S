---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost-app
  namespace: ekmai-collab
  labels:
    app: mattermost-app
    app.kubernetes.io/part-of: ekmai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost-app
  template:
    metadata:
      labels:
        app: mattermost-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mattermost-db 5432; do
                echo "Waiting for mattermost-db..."
                sleep 2
              done
      containers:
        - name: mattermost
          image: mattermost/mattermost-team-edition:release-10
          ports:
            - containerPort: 8065
              name: http
          env:
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MM_SQLSETTINGS_DATASOURCE
              valueFrom:
                secretKeyRef:
                  name: mattermost-db-secret
                  key: dsn
            - name: MM_SERVICESETTINGS_SITEURL
              value: https://mattermost.it205.ski.ad
          readinessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: 8065
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: 8065
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: mattermost-data
              mountPath: /mattermost/data
            - name: mattermost-config
              mountPath: /mattermost/config
      volumes:
        - name: mattermost-data
          persistentVolumeClaim:
            claimName: mattermost-data
        - name: mattermost-config
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mattermost-data
  namespace: ekmai-collab
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-app
  namespace: ekmai-collab
spec:
  type: ClusterIP
  selector:
    app: mattermost-app
  ports:
    - port: 8065
      targetPort: 8065
      name: http
