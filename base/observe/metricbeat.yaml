apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: ekmai-metricbeat
  namespace: ekmai-observe
spec:
  type: metricbeat
  version: 8.14.3
  elasticsearchRef:
    name: ekmai-es
  kibanaRef:
    name: ekmai-kibana
  config:
    metricbeat.config.modules:
      path: ${path.config}/modules.d/*.yml
      reload.enabled: false
    setup.dashboards.enabled: false
    processors:
      - add_host_metadata: ~
      - add_cloud_metadata: ~
  daemonSet:
    podTemplate:
      spec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        containers:
          - name: metricbeat
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: dockersock
                mountPath: /var/run/docker.sock
                readOnly: true
              - name: cgroup
                mountPath: /hostfs/sys/fs/cgroup
                readOnly: true
              - name: proc
                mountPath: /hostfs/proc
                readOnly: true
              - name: etc
                mountPath: /hostfs/etc
                readOnly: true
        volumes:
          - name: dockersock
            hostPath:
              path: /var/run/docker.sock
          - name: cgroup
            hostPath:
              path: /sys/fs/cgroup
          - name: proc
            hostPath:
              path: /proc
          - name: etc
            hostPath:
              path: /etc
