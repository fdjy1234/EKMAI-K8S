apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: ekmai-observe
data:
  apisix.conf: |
    input {
      http {
        host => "0.0.0.0"
        port => 8080
        codec => "json"
      }
    }

    filter {
      mutate {
        add_field => { "[@metadata][received_at]" => "%{@timestamp}" }
      }
    }

    output {
      elasticsearch {
        hosts => ["http://ekmai-es-es-http.ekmai-observe.svc.cluster.local:9200"]
        index => "apisix-logs-%{+YYYY.MM.dd}"
        user => "${ELASTIC_USERNAME}"
        password => "${ELASTIC_PASSWORD}"
      }

      stdout { codec => rubydebug }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: ekmai-observe
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.14.3
          ports:
            - containerPort: 5044
            - containerPort: 8080
            - containerPort: 9600
              name: http-metrics
          env:
            - name: ELASTIC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: elk-secrets
                  key: ELASTIC_USERNAME
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elk-secrets
                  key: ELASTIC_PASSWORD
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline/apisix.conf
              subPath: apisix.conf
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /_node/stats
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_node/stats
              port: 9600
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: pipeline
          configMap:
            name: logstash-pipeline
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: ekmai-observe
spec:
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: http
      port: 8088
      targetPort: 8080
