apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: ekmai-kibana
  namespace: ekmai-observe
spec:
  version: 8.14.3
  count: 1
  elasticsearchRef:
    name: ekmai-es
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests:
              memory: 512Mi
              cpu: "250m"
            limits:
              memory: 1Gi
              cpu: "500m"
