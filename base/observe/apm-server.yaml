apiVersion: apm.k8s.elastic.co/v1
kind: ApmServer
metadata:
  name: ekmai-apm
  namespace: ekmai-observe
spec:
  version: 8.14.3
  count: 1
  elasticsearchRef:
    name: ekmai-es
  kibanaRef:
    name: ekmai-kibana
  podTemplate:
    spec:
      containers:
        - name: apm-server
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 256Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "250m"
