---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wikijs-db-policy
  namespace: ekmai-kb
spec:
  podSelector:
    matchLabels:
      app: wikijs-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: wikijs-app
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-db-policy
  namespace: ekmai-kb
spec:
  podSelector:
    matchLabels:
      app: outline-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: outline-app
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-redis-policy
  namespace: ekmai-kb
spec:
  podSelector:
    matchLabels:
      app: outline-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: outline-app
      ports:
        - protocol: TCP
          port: 6379
---
# 允許 Gateway 存取 Wiki.js
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wikijs-ingress-policy
  namespace: ekmai-kb
spec:
  podSelector:
    matchLabels:
      app: wikijs-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 3000
---
# 允許 Gateway 存取 Outline
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outline-ingress-policy
  namespace: ekmai-kb
spec:
  podSelector:
    matchLabels:
      app: outline-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 3000
