---
# Outline 非敏感配置 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: outline-config
  namespace: ekmai-kb
data:
  URL: "https://outline.it205.ski.ad"
  FILE_STORAGE: "local"
  FILE_STORAGE_LOCAL_ROOT_DIR: "/var/lib/outline/data"
  FORCE_HTTPS: "true"
  PGSSLMODE: "disable"
  DATABASE_CONNECTION_POOL_MAX: "10"
  DATABASE_CONNECTION_POOL_MIN: "1"
  NODE_EXTRA_CA_CERTS: "/etc/ssl/certs/enterprise-root-ca.crt"
  # OIDC 非機密設定
  OIDC_AUTH_URI: "https://keycloak.it205.ski.ad/realms/dev-realm/protocol/openid-connect/auth"
  OIDC_TOKEN_URI: "https://keycloak.it205.ski.ad/realms/dev-realm/protocol/openid-connect/token"
  OIDC_USERINFO_URI: "https://keycloak.it205.ski.ad/realms/dev-realm/protocol/openid-connect/userinfo"
  OIDC_SCOPES: "openid profile email"
  OIDC_USERNAME_CLAIM: "preferred_username"
  OIDC_DISPLAY_NAME: "Keycloak"
  OIDC_CLIENT_ID: "outline"
