---
# LimitRange — 為每個 namespace 設定預設資源限制
# 防止未指定 resources 的 Pod 消耗過多資源
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: ekmai-iam
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      type: Container
